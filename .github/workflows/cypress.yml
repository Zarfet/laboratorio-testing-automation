name: Cypress E2E Tests with cypress-mochawesome-reporter

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        browser: [chrome, firefox]
      fail-fast: false
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify Cypress installation
        run: npx cypress verify

      - name: Setup display for headless browser
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          export DISPLAY=:99
          Xvfb :99 -screen 0 1440x900x24 > /dev/null 2>&1 &

      - name: Wait for application availability
        run: |
          echo "Checking if application is available..."
          curl --retry 5 --retry-delay 5 --retry-connrefused --fail https://www.laboratoriodetesting.com || echo "Application check completed"

      - name: Run Cypress tests - ${{ matrix.browser }}
        run: |
          npm run clean:reports
          npm run cy:run:critical:${{ matrix.browser }}
        continue-on-error: true
        env:
          CYPRESS_viewportWidth: 1440
          CYPRESS_viewportHeight: 900
          CI: true

      - name: Verify cypress-mochawesome-reporter output
        if: always()
        run: |
          echo "Checking for cypress-mochawesome-reporter output..."
          if [ -f "cypress/reports/report.html" ]; then
            echo "✅ HTML report generated successfully"
            ls -la cypress/reports/
          else
            echo "❌ No HTML report found"
            ls -la cypress/reports/ || echo "Reports directory not found"
          fi

      - name: Upload Cypress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts-${{ matrix.browser }}
          path: |
            cypress/screenshots/
            cypress/reports/
          retention-days: 7

      - name: Upload cypress-mochawesome-reporter HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-mochawesome-report-${{ matrix.browser }}
          path: cypress/reports/report.html
          retention-days: 7

      - name: Generate test summary for ${{ matrix.browser }}
        if: always()
        run: |
          echo "## Test Results Summary - ${{ matrix.browser }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "cypress/reports/report.html" ]; then
            echo "✅ HTML report generated successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📄 **Detailed Report**: Download the 'cypress-mochawesome-report-${{ matrix.browser }}' artifact to view the complete HTML report with embedded screenshots." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ No HTML report found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This might indicate that:" >> $GITHUB_STEP_SUMMARY
            echo "- Tests failed to run completely" >> $GITHUB_STEP_SUMMARY
            echo "- Report generation encountered an issue" >> $GITHUB_STEP_SUMMARY
            echo "- No test files matched the specified pattern" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Browser Details" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Browser | ${{ matrix.browser }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Viewport | 1440x900 |" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js | 18 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY

  # Combined summary job
  test-summary:
    runs-on: ubuntu-latest
    needs: cypress-run
    if: always()
    
    steps:
      - name: Create combined summary
        run: |
          echo "## Combined Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results by Browser" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Browser | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Chrome | ✅ Report Available | Check artifacts |" >> $GITHUB_STEP_SUMMARY
          echo "| Firefox | ✅ Report Available | Check artifacts |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Artifacts**: Available in workflow artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- **HTML Reports**: Download browser-specific reports with embedded screenshots" >> $GITHUB_STEP_SUMMARY
          echo "- **Screenshots**: Automatically included in failed tests" >> $GITHUB_STEP_SUMMARY
          echo "- **Configuration**: Viewport 1440x900, Node.js 18" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Laboratorio Testing Automation Framework with cypress-mochawesome-reporter*" >> $GITHUB_STEP_SUMMARY