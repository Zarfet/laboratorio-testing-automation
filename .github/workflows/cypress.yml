name: Cypress Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  cypress-run:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install jq for JSON processing
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install dependencies
        run: npm ci

      - name: Verify Cypress installation
        run: npx cypress verify

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          browser: ${{ matrix.browser }}
          spec: cypress/e2e/**/*.cy.js
          config: video=false,viewportWidth=1440,viewportHeight=900
        continue-on-error: true

      - name: Merge and Generate Mochawesome HTML report
        if: always()
        run: |
          mkdir -p cypress/reports/html
          npx mochawesome-merge cypress/reports/.jsons/*.json > cypress/reports/report.json
          npx mochawesome-report-generator cypress/reports/report.json --reportDir cypress/reports/html --inline

      - name: Generate Test Summary with Real Metrics
        if: always()
        run: |
          echo "## QA Craft Growth Challenge - Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          JSON_FILE=""
          if [ -f "cypress/reports/report.json" ]; then
            JSON_FILE="cypress/reports/report.json"
          else
            JSON_FILE=$(find cypress/reports -name "report_*.json" -type f | sort | tail -1)
            if [ -z "$JSON_FILE" ]; then
              JSON_FILE=$(find cypress/reports -name "*.json" -type f | head -1)
            fi
          fi

          if [ -f "$JSON_FILE" ]; then
            TOTAL_TESTS=$(jq -r '.stats.tests // 0' "$JSON_FILE")
            PASSED_TESTS=$(jq -r '.stats.passes // 0' "$JSON_FILE")
            FAILED_TESTS=$(jq -r '.stats.failures // 0' "$JSON_FILE")
            PENDING_TESTS=$(jq -r '.stats.pending // 0' "$JSON_FILE")
            SKIPPED_TESTS=$(jq -r '.stats.skipped // 0' "$JSON_FILE")
            DURATION=$(jq -r '.stats.duration // 0' "$JSON_FILE")

            DURATION_SEC=$((DURATION / 1000))
            DURATION_MIN=$((DURATION_SEC / 60))
            DURATION_REMAINDER=$((DURATION_SEC % 60))

            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TOTAL_TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED_TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILED_TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Pending | $PENDING_TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Skipped | $SKIPPED_TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | ${DURATION_MIN}m ${DURATION_REMAINDER}s |" >> $GITHUB_STEP_SUMMARY
            echo "| Browser | ${{ matrix.browser }} |" >> $GITHUB_STEP_SUMMARY

            if [ "$TOTAL_TESTS" -gt 0 ]; then
              SUCCESS_RATE=$((PASSED_TESTS * 100 / TOTAL_TESTS))
              echo "| Success Rate | ${SUCCESS_RATE}% |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ No test results JSON file found" >> $GITHUB_STEP_SUMMARY
            echo "Available files:" >> $GITHUB_STEP_SUMMARY
            find cypress/reports -name "*.json" -type f | head -5 >> $GITHUB_STEP_SUMMARY || echo "No JSON files found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-mochawesome-report-${{ matrix.browser }}
          path: |
            cypress/reports/
            cypress/screenshots/
          retention-days: 30

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.browser }}
          path: cypress/screenshots/
          retention-days: 10